name: Generate RSS Feeds

on:
  schedule:
    - cron: "*/30 * * * *"  # ogni 30 minuti
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedgen

      - name: Generate Primo Piano RSS
        run: python generate_rss.py

      - name: Generate Comunicati RSS
        run: python generate_comunicati.py

      - name: Commit and push feeds
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add feed.xml feed_comunic.xml
          git commit -m "Aggiorna feed RSS" || echo "No changes to commit"
          git push
